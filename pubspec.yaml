name: vd_shift_manager
description: "VD Shift Manager - Track shifts. Track growth."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management & Navigation
  get: ^4.6.6

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Firebase
  firebase_core: any
  firebase_auth: any
  cloud_firestore: any
  google_sign_in: any

  # Utilities
  intl: any
  path_provider: any
  connectivity_plus: any
  uuid: any

  # Charts
  fl_chart: any

  # Export
  pdf: any
  csv: any
  printing: any

  # UI Enhancements
  shimmer: any
  google_fonts: any
  animate_do: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
